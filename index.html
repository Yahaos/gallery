<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almost</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Базовые настройки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #030303; /* Почти черный фон */
            overflow: hidden; /* Скрываем скролл */
            font-family: 'Cinzel', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Контейнер для капель дождя */
        .rain-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Чтобы дождь не мешал кликам */
            z-index: 1;
        }

        /* Стили отдельной капли */
        .drop {
            position: absolute;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.3));
            width: 1px;
            height: 80px;
            top: -100px; /* Прячем каплю выше экрана до начала анимации */
            animation: fall linear infinite;
        }

        /* Анимация падения дождя */
        @keyframes fall {
            to {
                transform: translateY(120vh); /* Падает за пределы нижнего края */
            }
        }

        /* Контейнер для текста */
        .text-container {
            z-index: 2;
            text-align: center;
        }

        /* Стили текста "almost" */
        .almost-text {
            color: #ffffff;
            font-size: clamp(4rem, 10vw, 8rem); /* Адаптивный размер текста */
            font-weight: 400;
            letter-spacing: 20px;
            text-transform: lowercase;
            margin: 0;
            margin-right: -20px; /* Компенсация letter-spacing для выравнивания по центру */
            animation: breathe 4s ease-in-out infinite alternate;
        }

        /* Красивый эффект "дыхания" и свечения текста */
        @keyframes breathe {
            0% {
                opacity: 0.5;
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
                transform: scale(0.98);
            }
            100% {
                opacity: 1;
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.5),
                             0 0 40px rgba(255, 255, 255, 0.3),
                             0 0 80px rgba(255, 255, 255, 0.1);
                transform: scale(1.02);
            }
        }
    </style>
</head>
<body>

    <div class="rain-container" id="rain-container"></div>

    <div class="text-container">
        <h1 class="almost-text">almost</h1>
    </div>

    <script>
        // Скрипт для генерации дождя
        const rainContainer = document.getElementById('rain-container');
        const dropCount = 150; // Количество капель на экране

        for (let i = 0; i < dropCount; i++) {
            const drop = document.createElement('div');
            drop.classList.add('drop');

            // Случайные параметры для каждой капли, чтобы дождь выглядел естественно
            const xPosition = Math.random() * 100; // Позиция по горизонтали (0-100vw)
            const delay = Math.random() * 2; // Задержка перед стартом
            const duration = Math.random() * 0.5 + 0.5; // Скорость падения (от 0.5с до 1с)
            const opacity = Math.random() * 0.5 + 0.2; // Прозрачность капли

            drop.style.left = `${xPosition}vw`;
            drop.style.animationDuration = `${duration}s`;
            drop.style.animationDelay = `${delay}s`;
            drop.style.opacity = opacity;

            rainContainer.appendChild(drop);
        }
    </script>

</body>
</html>
