<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almost</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #030303;
            overflow: hidden;
            font-family: 'Cinzel', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Стартовый экран для активации звука */
        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #030303;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 100;
            transition: opacity 1s ease-out;
            animation: pulse-text 2s infinite alternate;
        }

        @keyframes pulse-text {
            from { opacity: 0.3; }
            to { opacity: 0.8; }
        }

        /* Эффект вспышки молнии */
        #lightning {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            transition: opacity 0.05s ease-out;
        }

        .rain-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .drop {
            position: absolute;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.4));
            width: 1px;
            height: 100px;
            top: -120px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(120vh); }
        }

        .text-container {
            z-index: 10;
            text-align: center;
        }

        .almost-text {
            color: #ffffff;
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: 400;
            letter-spacing: 20px;
            text-transform: lowercase;
            margin: 0;
            margin-right: -20px;
            animation: breathe 4s ease-in-out infinite alternate;
        }

        @keyframes breathe {
            0% {
                opacity: 0.5;
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
                transform: scale(0.98);
            }
            100% {
                opacity: 1;
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.5),
                             0 0 40px rgba(255, 255, 255, 0.3),
                             0 0 80px rgba(255, 255, 255, 0.1);
                transform: scale(1.02);
            }
        }
    </style>
</head>
<body>

    <div id="start-overlay">Click to start</div>

    <div id="lightning"></div>
    <div class="rain-container" id="rain-container"></div>

    <div class="text-container">
        <h1 class="almost-text">almost</h1>
    </div>

    <script>
        // --- АУДИО ---
        const rainAudio = new Audio('https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg');
        rainAudio.loop = true;
        rainAudio.volume = 0.4; // Шум дождя фоном

        const thunderAudio = new Audio('https://actions.google.com/sounds/v1/weather/thunder_crack.ogg');
        thunderAudio.volume = 0.9; // Гром громкий

        // --- ГЕНЕРАЦИЯ ДОЖДЯ ---
        const rainContainer = document.getElementById('rain-container');
        const dropCount = 200;

        for (let i = 0; i < dropCount; i++) {
            const drop = document.createElement('div');
            drop.classList.add('drop');

            const xPosition = Math.random() * 100;
            const delay = Math.random() * 2;
            const duration = Math.random() * 0.4 + 0.3;
            const opacity = Math.random() * 0.5 + 0.2;

            drop.style.left = `${xPosition}vw`;
            drop.style.animationDuration = `${duration}s`;
            drop.style.animationDelay = `${delay}s`;
            drop.style.opacity = opacity;

            rainContainer.appendChild(drop);
        }

        // --- ГЕНЕРАЦИЯ ГРОЗЫ ---
        const lightning = document.getElementById('lightning');

        function triggerLightning() {
            // Воспроизводим звук грома (сбрасываем время, если уже играл)
            thunderAudio.currentTime = 0;
            thunderAudio.play();

            // Первая вспышка
            lightning.style.opacity = Math.random() * 0.5 + 0.3;
            
            setTimeout(() => {
                lightning.style.opacity = 0;
                
                // Вероятность двойной вспышки
                if (Math.random() > 0.4) {
                    setTimeout(() => {
                        lightning.style.opacity = Math.random() * 0.6 + 0.4;
                        setTimeout(() => {
                            lightning.style.opacity = 0;
                        }, 50 + Math.random() * 100);
                    }, 50 + Math.random() * 150);
                }
            }, 50 + Math.random() * 100);

            // Планируем следующую молнию (от 5 до 15 секунд)
            const nextFlash = 5000 + Math.random() * 10000;
            setTimeout(triggerLightning, nextFlash);
        }

        // --- ИНИЦИАЛИЗАЦИЯ ПО КЛИКУ ---
        const startOverlay = document.getElementById('start-overlay');
        
        startOverlay.addEventListener('click', () => {
            // Прячем оверлей
            startOverlay.style.opacity = '0';
            setTimeout(() => {
                startOverlay.style.display = 'none';
            }, 1000);

            // Включаем звук дождя
            rainAudio.play();

            // Запускаем первую молнию через случайное время до 4 секунд
            setTimeout(triggerLightning, Math.random() * 4000);
        });
    </script>

</body>
</html>
